<script>
const btn = document.getElementById("btn");
const status = document.getElementById("status");

btn.onclick = async () => {
    status.innerText = "Iniciando teste...";

    try {
        if (!window.ethereum) {
            status.innerText = "window.ethereum não existe";
            return;
        }

        status.innerText = "MetaMask detectada";

        const eth = window.ethereum.providers
            ? window.ethereum.providers.find(p => p.isMetaMask)
            : window.ethereum;

        if (!eth) {
            status.innerText = "Provider MetaMask não encontrado";
            return;
        }

        status.innerText = "Provider encontrado. Lendo contas...";

        const before = await eth.request({ method: "eth_accounts" });
        status.innerText = "eth_accounts: " + JSON.stringify(before);

        const accounts = await eth.request({ method: "eth_requestAccounts" });
        status.innerText = "Conectado: " + JSON.stringify(accounts);
    } catch (err) {
        console.error(err);
        status.innerText = "Erro: " + (err.code || "sem código") + " - " + err.message;
    }
};
</script>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sport Club - Token</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

.card{
background:#2d2d2d;
padding:40px;
border-radius:20px;
border:3px solid #d32f2f;
display:inline-block;
max-width:500px;
}

button{
background:#d32f2f;
color:white;
border:none;
padding:15px;
margin:6px;
border-radius:10px;
cursor:pointer;
font-size:18px;
width:100%;
}

button:hover{
background:#ff3b3b;
}

#status{
margin-top:20px;
font-size:18px;
color:#ffeb3b;
white-space:pre-line;
}

.section{
margin-top:25px;
}

</style>
</head>

<body>

<div class="card">

<h1>🦁 Sport Club do Recife</h1>
<p>Economia Tokenizada</p>

<button id="connect">CONECTAR CARTEIRA</button>

<div id="status">Carteira não conectada</div>

<div class="section">
<h2>Sócios</h2>

<button onclick="gastar(30)">Sócio Simples - 30 TK</button>
<button onclick="gastar(50)">Sócio Plus - 50 TK</button>
<button onclick="gastar(100)">Sócio Super - 100 TK</button>

</div>

<div class="section">
<h2>Loja</h2>

<button onclick="gastar(200)">Comprar Camisa - 200 TK</button>

</div>

<div class="section">
<h2>Demo</h2>

<button onclick="gastar(100)">Votar Presidente - 100 TK</button>

</div>

</div>

<script>

const TOKEN_ADDRESS = "0x2b1e32bfe330f423ce4ed85d7d4a5ebf8f7d15f8"
const CLUB_ADDRESS = "COLOQUE_AQUI_A_CARTEIRA_DO_CLUBE"

const ABI = [
"function balanceOf(address owner) view returns (uint256)",
"function transfer(address to, uint amount) returns (bool)",
"function decimals() view returns (uint8)"
]

let provider
let signer
let token
let address

const status = document.getElementById("status")

document.getElementById("connect").onclick = conectar

async function conectar(){

if(!window.ethereum){

alert("MetaMask não encontrada")
return
}

try{

const accounts = await window.ethereum.request({
method: "eth_requestAccounts"
})

address = accounts[0]

provider = new ethers.providers.Web3Provider(window.ethereum)

signer = provider.getSigner()

token = new ethers.Contract(TOKEN_ADDRESS, ABI, provider)

const balance = await token.balanceOf(address)

const decimals = await token.decimals()

const saldo = ethers.utils.formatUnits(balance, decimals)

status.innerText =
"Carteira conectada:\n"+address+"\nSaldo: "+saldo+" TK"

}catch(err){

status.innerText = "Erro ao conectar: "+err.message

}

}

async function gastar(valor){

if(!signer){

alert("Conecte a carteira primeiro")
return
}

try{

const tokenSigner = token.connect(signer)

const decimals = await token.decimals()

const amount = ethers.utils.parseUnits(valor.toString(), decimals)

const tx = await tokenSigner.transfer(CLUB_ADDRESS, amount)

await tx.wait()

alert("Pagamento enviado!")

}catch(err){

alert("Erro: "+err.message)

}

}

</script>

</body>
</html>

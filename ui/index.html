<script>
const btn = document.getElementById("btn");
const statusEl = document.getElementById("status");

btn.addEventListener("click", async () => {
    if (!window.ethereum) {
        statusEl.innerText = "MetaMask não detectada.";
        return;
    }

    btn.disabled = true;
    statusEl.innerText = "Solicitando conexão da carteira...";

    try {
        console.log("Provider:", window.ethereum);

        const accounts = await window.ethereum.request({
            method: "eth_requestAccounts"
        });

        console.log("Accounts:", accounts);
        statusEl.innerText = "Conectado: " + accounts[0];
        btn.innerText = "CONECTADO";
    } catch (err) {
        console.error("Erro MetaMask:", err);

        if (err.code === 4001) {
            statusEl.innerText = "Você recusou a conexão na MetaMask.";
        } else if (err.code === -32002) {
            statusEl.innerText = "Já existe uma solicitação pendente na MetaMask. Abra a extensão e conclua ou cancele.";
        } else {
            statusEl.innerText = "Erro ao conectar: " + (err.message || "desconhecido");
        }
    } finally {
        btn.disabled = false;
    }
});
</script>
</html>
